<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,sans-serif)}
.outer{padding:12px 0}
.era-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.era-tab{padding:7px 14px;border-radius:var(--border-radius-md,8px);font-size:14px;font-weight:500;cursor:pointer;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-secondary);transition:all .15s}
.era-tab.active{background:var(--color-background-info);color:var(--color-text-info);border-color:transparent}
.era-tab:hover:not(.active){background:var(--color-background-secondary)}
.chart-wrapper{overflow-x:auto;overflow-y:visible}
.search-row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.search-row input{flex:1;padding:7px 12px;font-size:14px;border-radius:var(--border-radius-md,8px);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary)}
.search-row input::placeholder{color:var(--color-text-tertiary)}
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.stat-pill{font-size:13px;padding:5px 14px;border-radius:99px;border:0.5px solid var(--color-border-tertiary);color:var(--color-text-secondary);background:var(--color-background-secondary)}
.tooltip{position:fixed;pointer-events:none;z-index:9999;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md,8px);padding:12px 16px;font-size:14px;box-shadow:0 4px 16px rgba(0,0,0,.12);max-width:280px;display:none}
.tooltip .t-name{font-weight:500;color:var(--color-text-primary);margin-bottom:5px;font-size:15px}
.tooltip .t-ministry{color:var(--color-text-secondary);margin-bottom:4px;font-size:13px}
.tooltip .t-ps{font-size:12px;color:var(--color-text-tertiary)}
.legend{display:flex;gap:18px;flex-wrap:wrap;margin-top:12px}
.legend-item{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--color-text-secondary)}
.legend-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.node-group{cursor:pointer}
.node-group:hover .node-card{opacity:0.82}
.node-card{transition:opacity .15s}
</style>
<div class="outer">
  <h2 style="font-size:18px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px;">President Uhuru Kenyatta — Cabinet Organogram</h2>
  <p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:12px;">Hover over any card for details. Click a tab to switch cabinet era.</p>
  <div class="era-tabs" id="era-tabs"></div>
  <div class="stats" id="stats-row"></div>
  <div class="search-row">
    <input type="text" id="search-box" placeholder="Search by name, ministry, or principal secretary…" oninput="filterNodes(this.value)">
  </div>
  <div class="chart-wrapper">
    <svg id="tree-svg" style="display:block"></svg>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#185FA5"></div>Cabinet Secretary</div>
    <div class="legend-item"><div class="legend-dot" style="background:#0F6E56"></div>Principal Secretary</div>
    <div class="legend-item"><div class="legend-dot" style="background:#534AB7"></div>President (head)</div>
  </div>
</div>
<div class="tooltip" id="tooltip"></div>
<script>

let currentIdx=0,filterText="";

const C={
  pres:{fill:"#26215C",stroke:"#534AB7",text:"#EEEDFE",sub:"#AFA9EC"},
  cs:{fill:"#042C53",stroke:"#185FA5",text:"#E6F1FB",sub:"#85B7EB"},
  ps:{fill:"#04342C",stroke:"#0F6E56",text:"#E1F5EE",sub:"#5DCAA5"},
};

function trunc(s,n){return s&&s.length>n?s.slice(0,n-1)+"…":s||""}

function initTabs(){
  const c=document.getElementById("era-tabs");
  c.innerHTML="";
  CABINETS.forEach((cab,i)=>{
    const b=document.createElement("button");
    b.className="era-tab"+(i===currentIdx?" active":"");
    b.textContent=cab.label;
    b.onclick=()=>{currentIdx=i;filterText="";document.getElementById("search-box").value="";initTabs();render()};
    c.appendChild(b);
  });
}

function updateStats(members){
  const r=document.getElementById("stats-row");
  const wp=members.filter(m=>m.ps).length;
  r.innerHTML=`<span class="stat-pill">${members.length} Cabinet Secretaries</span><span class="stat-pill">${wp} with Principal Secretary</span><span class="stat-pill">Sworn in: ${CABINETS[currentIdx].date}</span>`;
}

function render(){
  const svg=document.getElementById("tree-svg");
  const cabinet=CABINETS[currentIdx];
  const members=filterText?cabinet.members.filter(m=>
    m.name.toLowerCase().includes(filterText)||
    m.ministry.toLowerCase().includes(filterText)||
    (m.ps||"").toLowerCase().includes(filterText)
  ):cabinet.members;
  updateStats(cabinet.members);

  // Layout constants — larger cards, bigger fonts
  const COLS=3;
  const CW=210; // card width
  const CH=62;  // CS card height
  const PSH=48; // PS card height
  const HGAP=18; // horizontal gap
  const VGAP=30; // vertical gap between PS bottom and next row CS top
  const ROW_H=CH+PSH+16+VGAP; // total row height
  const START_Y=108;
  const HW=250; // head card width
  const HH=66;
  const TOTAL_W=COLS*(CW+HGAP)-HGAP+80;
  const SVG_W=Math.max(TOTAL_W,640);
  const rows=Math.ceil(members.length/COLS);
  const SVG_H=START_Y+rows*ROW_H+50;

  svg.setAttribute("width",SVG_W);
  svg.setAttribute("height",SVG_H);
  svg.setAttribute("viewBox",`0 0 ${SVG_W} ${SVG_H}`);

  let h=`<defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="${C.ps.stroke}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>`;

  // President node
  const hx=(SVG_W-HW)/2, hy=14;
  h+=`<g>
    <rect class="node-card" x="${hx}" y="${hy}" width="${HW}" height="${HH}" rx="10" fill="${C.pres.fill}" stroke="${C.pres.stroke}" stroke-width="1"/>
    <text x="${hx+HW/2}" y="${hy+24}" text-anchor="middle" font-size="15" font-weight="600" fill="${C.pres.text}">President Uhuru Kenyatta</text>
    <text x="${hx+HW/2}" y="${hy+46}" text-anchor="middle" font-size="13" fill="${C.pres.sub}">Head of Executive — ${cabinet.date}</text>
  </g>`;

  const startX=(SVG_W-(COLS*(CW+HGAP)-HGAP))/2;

  members.forEach((m,i)=>{
    const col=i%COLS;
    const row=Math.floor(i/COLS);
    const x=startX+col*(CW+HGAP);
    const csY=START_Y+row*ROW_H;
    const psY=csY+CH+16;
    const midX=x+CW/2;

    // connector from president to CS
    h+=`<path d="M${SVG_W/2} ${hy+HH} L${SVG_W/2} ${hy+HH+8} L${midX} ${csY-14} L${midX} ${csY}" fill="none" stroke="${C.cs.stroke}" stroke-width="0.6" opacity="0.3"/>`;

    // CS card — larger text
    const csName=trunc(m.name,24);
    const min=trunc(m.ministry,30);
    h+=`<g class="node-group" onmouseenter="showTip(event,${JSON.stringify(m).replace(/"/g,'&quot;')})" onmouseleave="hideTip()">
      <rect class="node-card" x="${x}" y="${csY}" width="${CW}" height="${CH}" rx="8" fill="${C.cs.fill}" stroke="${C.cs.stroke}" stroke-width="0.8"/>
      <text x="${midX}" y="${csY+22}" text-anchor="middle" font-size="14" font-weight="600" fill="${C.cs.text}">${csName}</text>
      <text x="${midX}" y="${csY+42}" text-anchor="middle" font-size="12" fill="${C.cs.sub}">${min}</text>
    </g>`;

    // PS card
    if(m.ps){
      const psName=trunc(m.ps,24);
      h+=`<line x1="${midX}" y1="${csY+CH}" x2="${midX}" y2="${psY}" stroke="${C.ps.stroke}" stroke-width="0.7" marker-end="url(#arr2)" opacity="0.65"/>`;
      h+=`<g class="node-group" onmouseenter="showTip(event,${JSON.stringify({name:m.ps,ministry:'Principal Secretary',ps:'Reports to: '+m.name}).replace(/"/g,'&quot;')})" onmouseleave="hideTip()">
        <rect class="node-card" x="${x+12}" y="${psY}" width="${CW-24}" height="${PSH}" rx="6" fill="${C.ps.fill}" stroke="${C.ps.stroke}" stroke-width="0.7"/>
        <text x="${midX}" y="${psY+17}" text-anchor="middle" font-size="13" font-weight="600" fill="${C.ps.text}">${psName}</text>
        <text x="${midX}" y="${psY+34}" text-anchor="middle" font-size="12" fill="${C.ps.sub}">Principal Secretary</text>
      </g>`;
    }
  });

  if(members.length===0){
    h+=`<text x="${SVG_W/2}" y="${SVG_H/2}" text-anchor="middle" font-size="15" fill="var(--color-text-tertiary,#888)">No results found</text>`;
  }
  svg.innerHTML=h;
}

function filterNodes(v){filterText=v.toLowerCase().trim();render()}

function showTip(e,data){
  const t=document.getElementById("tooltip");
  t.innerHTML=`<div class="t-name">${data.name}</div><div class="t-ministry">${data.ministry}</div>${data.ps?`<div class="t-ps">PS: ${data.ps}</div>`:''}`;
  t.style.display="block";posTip(e);
}
function hideTip(){document.getElementById("tooltip").style.display="none"}
document.addEventListener("mousemove",e=>{const t=document.getElementById("tooltip");if(t.style.display==="block")posTip(e)});
function posTip(e){
  const t=document.getElementById("tooltip");
  const x=e.clientX+14,y=e.clientY-10;
  t.style.left=(x+280>window.innerWidth?e.clientX-290:x)+"px";
  t.style.top=y+"px";
}
initTabs();render();
</script>
