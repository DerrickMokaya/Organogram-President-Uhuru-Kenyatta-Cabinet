<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans, sans-serif); }
  .outer { padding: 16px 0; }
  .era-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .era-tab { padding: 6px 14px; border-radius: var(--border-radius-md, 8px); font-size: 13px; font-weight: 500; cursor: pointer; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-secondary); transition: all .15s; }
  .era-tab.active { background: var(--color-background-info); color: var(--color-text-info); border-color: transparent; }
  .era-tab:hover:not(.active) { background: var(--color-background-secondary); }
  .chart-wrapper { overflow-x: auto; overflow-y: visible; }
  .tree-svg { display: block; }
  .node-group { cursor: pointer; }
  .node-group:hover .node-card { opacity: 0.85; }
  .node-card { transition: opacity .15s; }
  .search-row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
  .search-row input { flex: 1; padding: 6px 10px; font-size: 13px; border-radius: var(--border-radius-md, 8px); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); }
  .search-row input::placeholder { color: var(--color-text-tertiary); }
  .stats { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
  .stat-pill { font-size: 12px; padding: 4px 12px; border-radius: 99px; border: 0.5px solid var(--color-border-tertiary); color: var(--color-text-secondary); background: var(--color-background-secondary); }
  .tooltip { position: fixed; pointer-events: none; z-index: 9999; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md, 8px); padding: 10px 14px; font-size: 13px; box-shadow: 0 4px 16px rgba(0,0,0,.12); max-width: 260px; display: none; }
  .tooltip .t-name { font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
  .tooltip .t-ministry { color: var(--color-text-secondary); margin-bottom: 3px; }
  .tooltip .t-ps { font-size: 12px; color: var(--color-text-tertiary); }
  .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 12px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--color-text-secondary); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
</style>
<div class="outer">
  <h2 style="font-size:16px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px;">President Uhuru Kenyatta — Cabinet Organogram</h2>
  <p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:14px;">Hover over any card to see details. Click a tab to switch cabinet era.</p>

  <div class="era-tabs" id="era-tabs"></div>
  <div class="stats" id="stats-row"></div>
  <div class="search-row">
    <input type="text" id="search-box" placeholder="Search by name, ministry, or principal secretary…" oninput="filterNodes(this.value)">
  </div>

  <div class="chart-wrapper">
    <svg id="tree-svg" class="tree-svg"></svg>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#185FA5"></div>Cabinet Secretary</div>
    <div class="legend-item"><div class="legend-dot" style="background:#0F6E56"></div>Principal Secretary</div>
    <div class="legend-item"><div class="legend-dot" style="background:#3C3489"></div>President (head)</div>
  </div>
</div>

let currentIdx = 0;
let filterText = "";

const COLORS = {
  president: { fill: "#26215C", stroke: "#534AB7", text: "#EEEDFE", sub: "#AFA9EC" },
  cs: { fill: "#042C53", stroke: "#185FA5", text: "#E6F1FB", sub: "#85B7EB" },
  ps: { fill: "#04342C", stroke: "#0F6E56", text: "#E1F5EE", sub: "#5DCAA5" },
};

function truncate(str, max) {
  return str && str.length > max ? str.slice(0, max - 1) + "…" : str;
}

function initTabs() {
  const container = document.getElementById("era-tabs");
  container.innerHTML = "";
  CABINETS.forEach((c, i) => {
    const btn = document.createElement("button");
    btn.className = "era-tab" + (i === currentIdx ? " active" : "");
    btn.textContent = c.label;
    btn.onclick = () => { currentIdx = i; filterText = ""; document.getElementById("search-box").value = ""; initTabs(); render(); };
    container.appendChild(btn);
  });
}

function updateStats(members) {
  const row = document.getElementById("stats-row");
  const withPS = members.filter(m => m.ps).length;
  row.innerHTML = `
    <span class="stat-pill">${members.length} Cabinet Secretaries</span>
    <span class="stat-pill">${withPS} with Principal Secretary</span>
    <span class="stat-pill">Sworn in: ${CABINETS[currentIdx].date}</span>
  `;
}

function render() {
  const svg = document.getElementById("tree-svg");
  const cabinet = CABINETS[currentIdx];
  const members = filterText
    ? cabinet.members.filter(m =>
        m.name.toLowerCase().includes(filterText) ||
        m.ministry.toLowerCase().includes(filterText) ||
        (m.ps || "").toLowerCase().includes(filterText)
      )
    : cabinet.members;

  updateStats(cabinet.members);

  const CARD_W = 180;
  const CARD_H = 52;
  const PS_H = 40;
  const COL_GAP = 16;
  const ROW_GAP = 90;
  const COLS = 3;
  const START_Y = 100;
  const HEAD_W = 220;
  const HEAD_H = 60;
  const SVG_W = COLS * (CARD_W + COL_GAP) + COL_GAP + 20;
  const totalSVGW = Math.max(SVG_W, 580);

  const rows = Math.ceil(members.length / COLS);
  const totalH = START_Y + rows * (CARD_H + PS_H + ROW_GAP) + 60;

  svg.setAttribute("width", totalSVGW);
  svg.setAttribute("height", totalH);
  svg.setAttribute("viewBox", `0 0 ${totalSVGW} ${totalH}`);

  let html = `<defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>`;

  // President node
  const headX = (totalSVGW - HEAD_W) / 2;
  const headY = 16;
  html += `<g class="node-group">
    <rect class="node-card" x="${headX}" y="${headY}" width="${HEAD_W}" height="${HEAD_H}" rx="10" fill="${COLORS.president.fill}" stroke="${COLORS.president.stroke}" stroke-width="1"/>
    <text x="${headX + HEAD_W/2}" y="${headY + 22}" text-anchor="middle" font-size="13" font-weight="500" fill="${COLORS.president.text}">President Uhuru Kenyatta</text>
    <text x="${headX + HEAD_W/2}" y="${headY + 40}" text-anchor="middle" font-size="11" fill="${COLORS.president.sub}">Head of Executive — ${cabinet.date}</text>
  </g>`;

  const firstX = (totalSVGW - (COLS * (CARD_W + COL_GAP) - COL_GAP)) / 2;

  members.forEach((m, i) => {
    const col = i % COLS;
    const row = Math.floor(i / COLS);
    const x = firstX + col * (CARD_W + COL_GAP);
    const csY = START_Y + row * (CARD_H + PS_H + ROW_GAP);
    const psY = csY + CARD_H + 10;
    const csTopX = x + CARD_W / 2;

    // Connector from president to CS
    const fromY = headY + HEAD_H;
    const midY = csY - 12;
    html += `<path d="M${totalSVGW/2} ${fromY} L${totalSVGW/2} ${fromY+8} L${csTopX} ${midY} L${csTopX} ${csY}" fill="none" stroke="${COLORS.cs.stroke}" stroke-width="0.7" opacity="0.35"/>`;

    // CS Card
    const ministry = truncate(m.ministry, 28);
    const csName = truncate(m.name, 22);
    html += `<g class="node-group" onmouseenter="showTip(event, ${JSON.stringify(m).replace(/"/g,'&quot;')})" onmouseleave="hideTip()">
      <rect class="node-card" x="${x}" y="${csY}" width="${CARD_W}" height="${CARD_H}" rx="8" fill="${COLORS.cs.fill}" stroke="${COLORS.cs.stroke}" stroke-width="0.8"/>
      <text x="${x+CARD_W/2}" y="${csY+18}" text-anchor="middle" font-size="12" font-weight="500" fill="${COLORS.cs.text}">${csName}</text>
      <text x="${x+CARD_W/2}" y="${csY+34}" text-anchor="middle" font-size="10" fill="${COLORS.cs.sub}">${ministry}</text>
    </g>`;

    // PS Card (if exists)
    if (m.ps) {
      const psName = truncate(m.ps, 22);
      html += `<line x1="${csTopX}" y1="${csY+CARD_H}" x2="${csTopX}" y2="${psY}" stroke="${COLORS.ps.stroke}" stroke-width="0.7" marker-end="url(#arr2)" opacity="0.6"/>`;
      html += `<g class="node-group" onmouseenter="showTip(event, ${JSON.stringify({name: m.ps, ministry: 'Principal Secretary', ps: 'Reports to: '+m.name}).replace(/"/g,'&quot;')})" onmouseleave="hideTip()">
        <rect class="node-card" x="${x+10}" y="${psY}" width="${CARD_W-20}" height="${PS_H}" rx="6" fill="${COLORS.ps.fill}" stroke="${COLORS.ps.stroke}" stroke-width="0.7"/>
        <text x="${x+CARD_W/2}" y="${psY+15}" text-anchor="middle" font-size="11" font-weight="500" fill="${COLORS.ps.text}">${psName}</text>
        <text x="${x+CARD_W/2}" y="${psY+29}" text-anchor="middle" font-size="10" fill="${COLORS.ps.sub}">Principal Secretary</text>
      </g>`;
    }
  });

  if (members.length === 0) {
    html += `<text x="${totalSVGW/2}" y="${totalH/2}" text-anchor="middle" font-size="14" fill="var(--color-text-tertiary, #888)">No results found</text>`;
  }

  svg.innerHTML = html;
}

function filterNodes(val) {
  filterText = val.toLowerCase().trim();
  render();
}

function showTip(e, data) {
  const tip = document.getElementById("tooltip");
  tip.innerHTML = `<div class="t-name">${data.name}</div><div class="t-ministry">${data.ministry}</div>${data.ps ? `<div class="t-ps">PS: ${data.ps}</div>` : ''}`;
  tip.style.display = "block";
  positionTip(e);
}

function hideTip() {
  document.getElementById("tooltip").style.display = "none";
}

document.addEventListener("mousemove", e => {
  const tip = document.getElementById("tooltip");
  if (tip.style.display === "block") positionTip(e);
});

function positionTip(e) {
  const tip = document.getElementById("tooltip");
  const x = e.clientX + 14;
  const y = e.clientY - 10;
  const right = x + 260;
  tip.style.left = (right > window.innerWidth ? e.clientX - 270 : x) + "px";
  tip.style.top = y + "px";
}

initTabs();
render();
</script>
